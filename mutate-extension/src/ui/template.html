<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mutate</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1e1e1e;
      --panel: #2a2a2a;
      --surface: #333;
      --surface-hover: #3a3a3a;
      --accent: #ff6611;
      --accent-hover: #ff8833;
      --text: #e0e0e0;
      --text-dim: #999;
      --border: #444;
      --border-dim: #333;
      --input-bg: #1a1a1a;
    }

    html, body {
      background: var(--bg);
      font-family: 'Lucida Grande', 'Lucida Sans Unicode', 'Segoe UI', sans-serif;
      color: var(--text);
      font-size: 11px;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    #app { height: 100%; }

    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .toolbar .title {
      font-size: 12px;
      font-weight: 500;
    }
    .toolbar .subtitle {
      font-size: 11px;
      color: var(--text-dim);
    }
    .toolbar-right { margin-left: auto; display: flex; gap: 6px; }

    .btn {
      padding: 5px 14px;
      font-family: inherit;
      font-size: 11px;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border-dim);
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.1s;
    }
    .btn:hover { background: var(--surface-hover); }
    .btn.primary {
      background: var(--accent);
      color: #000;
      border-color: var(--accent-hover);
      font-weight: 700;
    }
    .btn.primary:hover { background: var(--accent-hover); }
    .btn:disabled,
    .btn.primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .btn.primary:disabled:hover { background: var(--accent); }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      cursor: pointer;
    }
    .checkbox-row input[type="checkbox"] {
      accent-color: var(--accent);
      cursor: pointer;
    }

    .controls-panel {
      display: flex;
      padding: 12px;
      background: var(--bg);
      border-bottom: 1px solid var(--border-dim);
      flex-shrink: 0;
      gap: 24px;
    }
    .controls-grid {
      display: grid;
      grid-template-columns: auto auto auto;
      column-gap: 16px;
      row-gap: 8px;
      align-items: center;
    }
    .controls-grid .row-label {
      font-size: 11px;
      color: #ccc;
      text-align: right;
      padding-right: 8px;
    }
    .controls-grid .field {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .controls-grid .header {
      font-size: 10px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      text-align: center;
    }
    .slider {
      position: relative;
      width: 165px;
      height: 18px;
      --fill-from: 0%;
      --fill-to: 0%;
    }
    .slider input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 18px;
      background: transparent;
      margin: 0;
      padding: 0;
      outline: none;
    }
    .slider input[type="range"]::-webkit-slider-runnable-track {
      height: 4px;
      margin-top: 7px;
      border-radius: 2px;
      background:
        linear-gradient(
          to right,
          #0a0a0a 0,
          #0a0a0a var(--fill-from),
          #f08a3c var(--fill-from),
          #f08a3c var(--fill-to),
          #0a0a0a var(--fill-to),
          #0a0a0a 100%
        );
      box-shadow: inset 0 1px 1px rgba(0, 0, 0, 0.7);
    }
    .slider input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 16px;
      margin-top: -6px;
      border-radius: 3px;
      background: #d8d8d8;
      border: 1px solid #1a1a1a;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.4),
        inset 0 -1px 0 rgba(0, 0, 0, 0.15);
      cursor: pointer;
    }
    .slider input[type="range"]:hover::-webkit-slider-thumb { background: #f0f0f0; }
    .slider input[type="range"]:active::-webkit-slider-thumb { background: #ffffff; }
    .slider input[type="range"]::-moz-range-track {
      height: 4px;
      border-radius: 2px;
      background:
        linear-gradient(
          to right,
          #0a0a0a 0,
          #0a0a0a var(--fill-from),
          #f08a3c var(--fill-from),
          #f08a3c var(--fill-to),
          #0a0a0a var(--fill-to),
          #0a0a0a 100%
        );
      box-shadow: inset 0 1px 1px rgba(0, 0, 0, 0.7);
    }
    .slider input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 16px;
      border-radius: 3px;
      background: #d8d8d8;
      border: 1px solid #1a1a1a;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.4),
        inset 0 -1px 0 rgba(0, 0, 0, 0.15);
      cursor: pointer;
    }
    .slider input[type="range"]:hover::-moz-range-thumb { background: #f0f0f0; }
    .slider input[type="range"]:active::-moz-range-thumb { background: #ffffff; }
    .slider-notch {
      position: absolute;
      left: 50%;
      top: 3px;
      width: 2px;
      height: 12px;
      background: #aaa;
      border-radius: 1px;
      pointer-events: none;
      transform: translateX(-1px);
      z-index: 0;
    }
    .slider input[type="range"] { position: relative; z-index: 1; }
    .controls-grid input[type="number"] {
      width: 64px;
      padding: 3px 6px;
      background: #161616;
      color: #ddd;
      border: 1px solid #2c2c2c;
      border-radius: 2px;
      font-family: inherit;
      font-size: 11px;
    }
    .controls-grid .divider {
      grid-column: 1 / -1;
      height: 1px;
      background: var(--border-dim);
      margin: 4px 0;
    }
    .controls-grid .amount-cell {
      grid-column: 2 / span 2;
      display: flex;
      justify-content: flex-start;
    }
    .controls-grid .amount-header {
      grid-column: 2 / span 2;
      text-align: left;
    }

    .right-pane {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .right-pane .section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-dim);
      margin-bottom: 4px;
    }
    .right-pane .field { display: flex; align-items: center; gap: 6px; }
    .right-pane input[type="number"] {
      width: 64px;
      padding: 3px 6px;
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--border-dim);
      border-radius: 2px;
      font-family: inherit;
      font-size: 11px;
    }
    .stepper {
      display: inline-flex;
      align-items: stretch;
      gap: 0;
    }
    .stepper input[type="number"] {
      width: 56px;
      padding: 3px 6px;
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--border-dim);
      border-right: none;
      border-radius: 2px 0 0 2px;
      font-family: inherit;
      font-size: 11px;
      -moz-appearance: textfield;
      appearance: textfield;
    }
    .stepper input[type="number"]::-webkit-inner-spin-button,
    .stepper input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .stepper-buttons {
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border-dim);
      border-radius: 0 2px 2px 0;
      overflow: hidden;
    }
    .stepper-btn {
      width: 16px;
      height: 11px;
      padding: 0;
      font-size: 7px;
      line-height: 1;
      background: var(--surface);
      color: var(--text-dim);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .stepper-btn:first-child { border-bottom: 1px solid var(--border-dim); }
    .stepper-btn:hover:not(:disabled) { background: var(--surface-hover); color: var(--text); }
    .stepper-btn:disabled { opacity: 0.4; cursor: default; }

    .hint {
      font-size: 9px;
      color: var(--text-dim);
      margin-top: 4px;
      max-width: 160px;
      line-height: 1.3;
    }
    .hint.warn { color: var(--accent); }
    .hint.hint-lg { font-size: 10px; }
    .toolbar-right .hint { margin-top: 0; max-width: none; align-self: center; }

    .btn-group { display: flex; gap: 2px; }
    .btn-group .tab {
      padding: 4px 10px;
      font-size: 10px;
      font-family: inherit;
      background: var(--surface);
      color: var(--text-dim);
      border: 1px solid var(--border-dim);
      border-radius: 2px;
      cursor: pointer;
      letter-spacing: 0.3px;
    }
    .btn-group .tab.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent-hover);
      font-weight: 700;
    }
    .btn-group .tab:hover:not(.active) { background: var(--surface-hover); color: var(--text); }

    .variations {
      flex: 1;
      overflow: auto;
      padding: 12px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 10px;
      align-content: start;
    }
    .variation {
      background: var(--panel);
      border: 1px solid var(--border-dim);
      border-radius: 3px;
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .variation .label {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      justify-content: space-between;
    }
    .variation.dimmed { opacity: 0.35; }
    .variation.in-place {
      border-color: var(--accent);
    }
    .variation .status {
      font-size: 9px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .piano-roll {
      background: var(--input-bg);
      border: 1px solid var(--border-dim);
      border-radius: 2px;
      display: block;
    }

    .preview-panel {
      flex: 1;
      overflow: auto;
      padding: 12px;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .preview-header {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .preview-header .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-dim);
    }
    .preview-header .btn.small {
      padding: 2px 8px;
      font-size: 10px;
    }
    .preview-header .reroll {
      margin-left: auto;
      margin-right: auto;
      line-height: 1;
      padding: 3px 10px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .preview-header .reroll-label {
      font-size: 10px;
      letter-spacing: 0.5px;
    }
    .preview-header .reroll-die {
      font-size: 14px;
    }
    .clip-picker {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .clip-picker-label {
      font-size: 10px;
      color: var(--text-dim);
      min-width: 70px;
      text-align: center;
    }
    .preview-clip-name {
      font-size: 11px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .preview-source .mini-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    /* __UI_BUNDLE__ */
  </script>
</body>
</html>
