<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mutate</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1e1e1e;
      --panel: #2a2a2a;
      --surface: #333;
      --surface-hover: #3a3a3a;
      --accent: #ff6611;
      --accent-hover: #ff8833;
      --text: #e0e0e0;
      --text-dim: #999;
      --border: #444;
      --border-dim: #333;
      --input-bg: #1a1a1a;
    }

    html, body {
      background: var(--bg);
      font-family: 'Lucida Grande', 'Lucida Sans Unicode', 'Segoe UI', sans-serif;
      color: var(--text);
      font-size: 11px;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    #app { height: 100%; }

    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .toolbar .title {
      font-size: 12px;
      font-weight: 500;
    }
    .toolbar .subtitle {
      font-size: 11px;
      color: var(--text-dim);
    }
    .toolbar-right { margin-left: auto; display: flex; gap: 6px; }

    .btn {
      padding: 5px 14px;
      font-family: inherit;
      font-size: 11px;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border-dim);
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.1s;
    }
    .btn:hover { background: var(--surface-hover); }
    .btn.primary {
      background: var(--accent);
      color: #000;
      border-color: var(--accent-hover);
      font-weight: 700;
    }
    .btn.primary:hover { background: var(--accent-hover); }
    .btn:disabled,
    .btn.primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .btn.primary:disabled:hover { background: var(--accent); }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      cursor: pointer;
    }
    .checkbox-row input[type="checkbox"] {
      accent-color: var(--accent);
      cursor: pointer;
    }

    .source-panel {
      padding: 10px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--border-dim);
      flex-shrink: 0;
    }
    .source-panel .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .controls-panel {
      display: flex;
      padding: 12px;
      background: var(--bg);
      border-bottom: 1px solid var(--border-dim);
      flex-shrink: 0;
      gap: 24px;
    }
    .controls-grid {
      display: grid;
      grid-template-columns: auto auto auto;
      column-gap: 10px;
      row-gap: 6px;
      align-items: center;
    }
    .controls-grid .row-label {
      font-size: 11px;
      color: var(--text-dim);
      text-align: right;
      padding-right: 8px;
    }
    .controls-grid .field {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .controls-grid .header {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      text-align: center;
    }
    .controls-grid input[type="range"] {
      width: 110px;
      accent-color: var(--text-dim);
    }
    .controls-grid input[type="number"] {
      width: 52px;
      padding: 3px 6px;
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--border-dim);
      border-radius: 2px;
      font-family: inherit;
      font-size: 11px;
    }
    .controls-grid .divider {
      grid-column: 1 / -1;
      height: 1px;
      background: var(--border-dim);
      margin: 4px 0;
    }
    .controls-grid .amount-cell {
      grid-column: 2 / span 2;
      display: flex;
      justify-content: flex-start;
    }
    .controls-grid .amount-header {
      grid-column: 2 / span 2;
      text-align: left;
    }

    .right-pane {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .right-pane .section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-dim);
      margin-bottom: 4px;
    }
    .right-pane .field { display: flex; align-items: center; gap: 6px; }
    .right-pane input[type="number"] {
      width: 52px;
      padding: 3px 6px;
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--border-dim);
      border-radius: 2px;
      font-family: inherit;
      font-size: 11px;
    }
    .stepper {
      display: inline-flex;
      align-items: stretch;
      gap: 0;
    }
    .stepper input[type="number"] {
      width: 44px;
      padding: 3px 6px;
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--border-dim);
      border-right: none;
      border-radius: 2px 0 0 2px;
      font-family: inherit;
      font-size: 11px;
      -moz-appearance: textfield;
      appearance: textfield;
    }
    .stepper input[type="number"]::-webkit-inner-spin-button,
    .stepper input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .stepper-buttons {
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border-dim);
      border-radius: 0 2px 2px 0;
      overflow: hidden;
    }
    .stepper-btn {
      width: 16px;
      height: 11px;
      padding: 0;
      font-size: 7px;
      line-height: 1;
      background: var(--surface);
      color: var(--text-dim);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .stepper-btn:first-child { border-bottom: 1px solid var(--border-dim); }
    .stepper-btn:hover:not(:disabled) { background: var(--surface-hover); color: var(--text); }
    .stepper-btn:disabled { opacity: 0.4; cursor: default; }

    .hint {
      font-size: 9px;
      color: var(--text-dim);
      margin-top: 4px;
      max-width: 160px;
      line-height: 1.3;
    }
    .hint.warn { color: var(--accent); }
    .toolbar-right .hint { margin-top: 0; max-width: none; align-self: center; }

    .btn-group { display: flex; gap: 2px; }
    .btn-group .tab {
      padding: 4px 10px;
      font-size: 10px;
      font-family: inherit;
      background: var(--surface);
      color: var(--text-dim);
      border: 1px solid var(--border-dim);
      border-radius: 2px;
      cursor: pointer;
      letter-spacing: 0.3px;
    }
    .btn-group .tab.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent-hover);
      font-weight: 700;
    }
    .btn-group .tab:hover:not(.active) { background: var(--surface-hover); color: var(--text); }

    .variations {
      flex: 1;
      overflow: auto;
      padding: 12px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 10px;
      align-content: start;
    }
    .previews-truncated {
      grid-column: 1 / -1;
      font-size: 10px;
      color: var(--text-dim);
      text-align: center;
      padding: 6px 0;
      font-style: italic;
    }
    .variation {
      background: var(--panel);
      border: 1px solid var(--border-dim);
      border-radius: 3px;
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .variation .label {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      justify-content: space-between;
    }
    .variation.dimmed { opacity: 0.35; }
    .variation.in-place {
      border-color: var(--accent);
    }
    .variation .status {
      font-size: 9px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .piano-roll {
      background: var(--input-bg);
      border: 1px solid var(--border-dim);
      border-radius: 2px;
      display: block;
    }

    .scene-header {
      padding: 10px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--border-dim);
      flex-shrink: 0;
    }
    .scene-header .title-line {
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 2px;
    }
    .scene-header .subtitle-line {
      font-size: 11px;
      color: var(--text-dim);
    }

    .indicator-panel {
      flex: 1;
      overflow: auto;
      padding: 12px;
      background: var(--bg);
    }
    .indicator-grid {
      display: inline-block;
    }
    .grid-col-labels {
      display: flex;
      gap: 2px;
      margin-bottom: 4px;
      height: 48px;
      align-items: flex-end;
    }
    .grid-col-label {
      font-size: 9px;
      color: var(--text-dim);
      writing-mode: vertical-lr;
      transform: rotate(180deg);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-height: 48px;
    }
    .grid-body {
      display: flex;
      flex-direction: column;
    }
    .grid-row {
      display: flex;
      align-items: center;
      margin-bottom: 2px;
    }
    .grid-row-label {
      width: 86px;
      padding-right: 4px;
      font-size: 10px;
      color: var(--text-dim);
      text-align: right;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .grid-row-label.new-scene {
      color: var(--accent);
    }
    .grid-cell {
      border-radius: 2px;
      border: 1px solid transparent;
    }
    .grid-cell--write-empty {
      background: var(--accent);
    }
    .grid-cell--write-overwrite {
      background: var(--accent);
      border-color: #ff3333;
    }
    .grid-cell--skip {
      background: var(--surface);
      opacity: 0.35;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    /* __UI_BUNDLE__ */
  </script>
</body>
</html>
