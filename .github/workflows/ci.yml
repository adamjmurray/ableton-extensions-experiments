name: CI

on:
  push:
    branches: [main]
  pull_request:

# The extensions depend on Ableton's Extensions SDK, which is confidential beta
# material and is NOT in this repo (it's gitignored). Without it the extensions
# can't `npm install`, typecheck, or test — so CI covers what it can without the
# SDK: the repo's own dev scripts. Extension checks run locally via `npm run check`
# where the SDK is present.
jobs:
  scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Typecheck and lint dev scripts
        run: npm run check:scripts
