<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Extension</title>
  <script>
    const isWebKitMessageHandlerAvailable = window.webkit &&
      window.webkit.messageHandlers &&
      window.webkit.messageHandlers.live;
    const isWebView2 = window.chrome && window.chrome.webview;

    function doSendMessage(message) {
      if (isWebKitMessageHandlerAvailable) {
        window.webkit.messageHandlers.live.postMessage(message);
      } else if (isWebView2) {
        window.chrome.webview.postMessage(message);
      }
    }

    function closeWithResult(result) {
      doSendMessage({
        name: "close_and_send",
        args: [JSON.stringify(result)]
      });
    }

    function submit() {
      closeWithResult({
        message: document.getElementById('message').value
      });
    }
  </script>
  <style>
    :root {
      --ableton-panel: #4E4E4E;
      --ableton-button: #FFA500;
      --ableton-button-hover: #FF8C00;
      --ableton-text: #FFFFFF;
      --ableton-input-bg: #2C2C2C;
    }

    html, body {
      background-color: var(--ableton-panel);
      font-family: 'Lucida Grande', 'Lucida Sans Unicode', sans-serif;
      color: var(--ableton-text);
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      padding: 16px;
      width: 268px;
    }

    p {
      font-size: 12px;
      margin: 0 0 12px 0;
    }

    input[type="text"] {
      background-color: var(--ableton-input-bg);
      border: 1px solid #1a1a1a;
      border-radius: 2px;
      color: var(--ableton-text);
      font-family: inherit;
      font-size: 12px;
      padding: 6px 8px;
      margin-bottom: 16px;
      width: 100%;
      box-sizing: border-box;
    }

    input[type="text"]:focus {
      outline: 1px solid var(--ableton-button);
    }

    .button-container {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    button {
      padding: 6px 12px;
      font-size: 12px;
      background-color: var(--ableton-button);
      color: #000;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      font-family: inherit;
    }

    button:hover {
      background-color: var(--ableton-button-hover);
    }

    button.secondary {
      background-color: #666;
      color: var(--ableton-text);
    }

    button.secondary:hover {
      background-color: #777;
    }
  </style>
</head>

<body>
  <div class="modal-content">
    <p>Enter a message:</p>
    <input type="text" id="message" placeholder="Type something..." />
    <div class="button-container">
      <button class="secondary" onclick='closeWithResult({ message: null })'>Cancel</button>
      <button onclick="submit()">OK</button>
    </div>
  </div>
</body>

</html>
