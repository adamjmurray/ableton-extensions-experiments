<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notation</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1e1e1e;
      --panel: #2a2a2a;
      --surface: #333;
      --surface-hover: #3a3a3a;
      --accent: #ff6611;
      --accent-hover: #ff8833;
      --text: #e0e0e0;
      --text-dim: #999;
      --border: #444;
      --border-dim: #333;
      --input-bg: #1a1a1a;
    }

    html, body {
      background: var(--bg);
      font-family: 'Lucida Grande', 'Lucida Sans Unicode', 'Segoe UI', sans-serif;
      color: var(--text);
      font-size: 11px;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    #app { height: 100%; }

    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .toolbar-right { margin-left: auto; }

    .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-dim);
    }

    .separator { color: var(--text-dim); }

    /* Button group */
    .btn-group { display: flex; gap: 2px; }
    .btn-group button {
      padding: 5px 10px;
      font-size: 10px;
      font-family: inherit;
      background: var(--surface);
      color: var(--text-dim);
      border: 1px solid var(--border-dim);
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.1s;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }
    .btn-group button.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent-hover);
      font-weight: 700;
    }
    .btn-group button:hover:not(.active) { background: var(--surface-hover); color: var(--text); }

    /* Select */
    select {
      background: var(--input-bg);
      border: 1px solid var(--border-dim);
      border-radius: 2px;
      color: var(--text);
      font-family: inherit;
      font-size: 11px;
      padding: 4px 6px;
    }

    /* Export / Close buttons */
    .btn-export, .btn-close {
      padding: 5px 12px;
      font-size: 10px;
      font-family: inherit;
      border: 1px solid var(--border-dim);
      border-radius: 2px;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: all 0.1s;
    }
    .btn-export {
      background: var(--surface);
      color: var(--text-dim);
    }
    .btn-export:hover { background: var(--surface-hover); color: var(--text); }
    .btn-close {
      background: var(--accent);
      color: #000;
      font-weight: 700;
      border-color: var(--accent-hover);
    }
    .btn-close:hover { background: var(--accent-hover); }

    /* Status bar */
    .status-bar {
      padding: 4px 12px;
      font-size: 10px;
      color: var(--text-dim);
      background: var(--bg);
      border-bottom: 1px solid var(--border-dim);
      flex-shrink: 0;
    }

    /* Debug XML */
    .debug-xml {
      background: var(--input-bg);
      color: var(--text-dim);
      font-family: monospace;
      font-size: 10px;
      padding: 8px;
      margin: 0 8px;
      max-height: 200px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-all;
      border: 1px solid var(--border-dim);
      user-select: text;
      -webkit-user-select: text;
    }

    /* Notation container */
    .notation-container {
      flex: 1;
      overflow: auto;
      background: #fff;
      margin: 8px;
      border-radius: 4px;
      padding: 16px;
    }

    .notation-container svg {
      width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    /* __UI_BUNDLE__ */
  </script>
</body>
</html>
