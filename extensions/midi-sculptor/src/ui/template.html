<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIDI Sculptor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1e1e1e;
      --panel: #2a2a2a;
      --surface: #333;
      --surface-hover: #3a3a3a;
      --accent: #ff6611;
      --accent-dim: rgba(255, 102, 17, 0.3);
      --accent-hover: #ff8833;
      --text: #e0e0e0;
      --text-dim: #999;
      --text-muted: #666;
      --border: #444;
      --border-dim: #333;
      --input-bg: #1a1a1a;
      --grid: #222;
    }

    html, body {
      background: var(--bg);
      font-family: 'Lucida Grande', 'Lucida Sans Unicode', 'Segoe UI', sans-serif;
      color: var(--text);
      font-size: 11px;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    #app { height: 100%; }

    /* Tab bar */
    .tab-bar {
      display: flex;
      gap: 2px;
      padding: 8px 12px 0;
    }

    .tab-btn {
      flex: 1;
      padding: 7px 0;
      background: var(--surface);
      border: 1px solid var(--border-dim);
      border-bottom: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 11px;
      font-family: inherit;
      border-radius: 4px 4px 0 0;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.1s;
    }

    .tab-btn.active {
      background: var(--panel);
      color: var(--text);
      font-weight: 700;
      border-color: var(--border);
    }

    .tab-btn:hover:not(.active) { color: var(--text); background: var(--surface-hover); }

    /* Panel container */
    .panel-container {
      flex: 1;
      overflow-y: auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-top: none;
      margin: 0 12px;
      padding: 12px;
    }

    /* Section label */
    .section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-dim);
      margin: 8px 0 6px;
    }

    .section-label:first-child { margin-top: 0; }

    /* Row layouts */
    .row { display: flex; align-items: center; gap: 12px; }
    .row-spread { display: flex; align-items: center; justify-content: space-between; }
    .row-wrap { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
    .row-center { display: flex; align-items: center; justify-content: center; gap: 16px; flex-wrap: wrap; }
    .gap-sm { gap: 6px; }
    .gap-lg { gap: 20px; }
    .mt-sm { margin-top: 6px; }
    .mt-md { margin-top: 10px; }

    /* Button group */
    .btn-group { display: flex; gap: 2px; }
    .btn-group button {
      padding: 5px 10px;
      font-size: 10px;
      font-family: inherit;
      background: var(--surface);
      color: var(--text-dim);
      border: 1px solid var(--border-dim);
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.1s;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }
    .btn-group button.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent-hover);
      font-weight: 700;
    }
    .btn-group button:hover:not(.active) { background: var(--surface-hover); color: var(--text); }
    .btn-group button svg { vertical-align: middle; }

    /* Action buttons */
    .btn-action {
      padding: 6px 14px;
      font-size: 11px;
      font-family: inherit;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
    .btn-action:hover { background: var(--accent-hover); }
    .btn-action.secondary { background: var(--surface); color: var(--text); }
    .btn-action.secondary:hover { background: var(--surface-hover); }

    /* Footer */
    .footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 8px 12px;
    }

    /* Label */
    .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-dim);
    }

    /* Checkboxes */
    .checkbox-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .checkbox-row label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      color: var(--text-dim);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .checkbox-row label:hover { color: var(--text); }

    /* Inline select */
    select {
      background: var(--input-bg);
      border: 1px solid var(--border-dim);
      border-radius: 2px;
      color: var(--text);
      font-family: inherit;
      font-size: 11px;
      padding: 4px 6px;
    }

    input[type="number"] {
      background: var(--input-bg);
      border: 1px solid var(--border-dim);
      border-radius: 2px;
      color: var(--text);
      font-family: inherit;
      font-size: 11px;
      padding: 4px 6px;
      width: 50px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    /* __UI_BUNDLE__ */
  </script>
</body>
</html>
